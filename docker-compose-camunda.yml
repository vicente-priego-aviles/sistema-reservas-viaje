# While the Docker images themselves are supported for production usage,
# this docker-compose.yaml is designed to be used by developers to run
# an environment locally. It is not designed to be used in production.
# We recommend to use Kubernetes in production with our Helm Charts:
# https://docs.camunda.io/docs/self-managed/setup/install/

# Camunda 8.9 Orchestration Cluster — imagen unificada camunda/camunda
# A partir de 8.8, Zeebe + Operate + Tasklist se fusionan en una única imagen.
# Operate: http://localhost:8080/operate   (usuario: demo / contraseña: demo)
# Tasklist: http://localhost:8080/tasklist (usuario: demo / contraseña: demo)
# Zeebe gRPC: localhost:26500
# Zeebe REST: http://localhost:8080

services:

  camunda:
    image: camunda/camunda:${CAMUNDA_VERSION}
    container_name: camunda
    ports:
      - "26500:26500"  # Zeebe gRPC
      - "8080:8080"    # REST API + Operate UI + Tasklist UI
      - "9600:9600"    # Management / health
    environment:
      # Secondary storage (Elasticsearch)
      - CAMUNDA_DATA_SECONDARY_STORAGE_TYPE=elasticsearch
      - CAMUNDA_DATA_SECONDARY_STORAGE_ELASTICSEARCH_URL=http://elasticsearch:9200
      # Elasticsearch exporter para registros Zeebe
      - CAMUNDA_DATA_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - CAMUNDA_DATA_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - CAMUNDA_DATA_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
      # Evitar errores por disco casi lleno en entornos locales
      - ZEEBE_BROKER_DATA_DISKUSAGECOMMANDWATERMARK=0.998
      - ZEEBE_BROKER_DATA_DISKUSAGEREPLICATIONWATERMARK=0.999
      # Autenticación: basic auth con credenciales por defecto demo/demo
      - CAMUNDA_SECURITY_AUTHENTICATION_METHOD=basic
      - "JAVA_TOOL_OPTIONS=-Xms512m -Xmx512m"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/usr/sbin/wget -q --spider http://localhost:9600/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    volumes:
      - camunda:/usr/local/camunda/data
    networks:
      - camunda-platform
    depends_on:
      elasticsearch:
        condition: service_healthy

  connectors:
    image: camunda/connectors-bundle:${CAMUNDA_CONNECTORS_VERSION}
    container_name: connectors
    ports:
      - "8085:8080"
    environment:
      - CAMUNDA_CLIENT_MODE=self-managed
      - CAMUNDA_CLIENT_ZEEBE_GRPCADDRESS=http://camunda:26500
      - CAMUNDA_CLIENT_ZEEBE_RESTADDRESS=http://camunda:8080
      - OPERATE_CLIENT_BASEURL=http://camunda:8080
      - OPERATE_CLIENT_PROFILE=simple
      - management.endpoints.web.exposure.include=health,metrics
      - management.endpoint.health.probes.enabled=true
      - logging.level.io.camunda.zeebe.client.impl.ZeebeCallCredentials=ERROR
      - logging.level.io.camunda.connector.runtime.inbound.importer=ERROR
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    env_file: connector-secrets.txt
    networks:
      - camunda-platform
    depends_on:
      camunda:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      # allow running with low disk space
      - cluster.routing.allocation.disk.threshold_enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cat/health | grep -qE 'green|yellow'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - elastic:/usr/share/elasticsearch/data
    networks:
      - camunda-platform

volumes:
  camunda:
  elastic:

networks:
  camunda-platform:
    driver: bridge
